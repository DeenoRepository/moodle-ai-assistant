<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8f9fa;
      }

      h1 {
        font-size: 18px;
        color: #202124;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 12px;
        color: #5f6368;
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #3c4043;
        margin-bottom: 6px;
      }

      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        font-size: 13px;
        font-family: monospace;
        transition: border-color 0.2s;
      }

      input[type="password"]:focus {
        outline: none;
        border-color: #4285f4;
        box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
      }

      .hint {
        font-size: 11px;
        color: #80868b;
        margin-top: 6px;
        margin-bottom: 16px;
      }

      .hint a {
        color: #4285f4;
        text-decoration: none;
      }

      .hint a:hover {
        text-decoration: underline;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4285f4;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #3367d6;
      }

      button:active {
        background: #2a56c6;
      }

      #status {
        margin-top: 12px;
        font-size: 12px;
        text-align: center;
        min-height: 18px;
      }

      #status.success {
        color: #1e8e3e;
      }

      #status.error {
        color: #d93025;
      }

      .divider {
        height: 1px;
        background: #dadce0;
        margin: 16px 0;
      }

      .model-select {
        margin-bottom: 16px;
      }

      select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        font-size: 13px;
        background: #fff;
        cursor: pointer;
      }

      select:focus {
        outline: none;
        border-color: #4285f4;
        box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
      }

      .autofill-toggle {
        margin-bottom: 16px;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #3c4043;
        cursor: pointer;
      }

      .checkbox-label input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
        accent-color: #4285f4;
      }
    </style>
  </head>
  <body>
    <h1>Moodle AI Assistant</h1>
    <p class="subtitle">Powered by Google Gemini</p>

    <div class="divider"></div>

    <label for="apiKey">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key" />
    <p class="hint">
      Get your free API key at
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>
    </p>

    <div class="model-select">
      <label for="model">Model</label>
      <select id="model">
        <option value="gemini-2.0-flash">Gemini 2.0 Flash (Recommended)</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
        <option value="gemma-4-31b">Gemma 4 31B</option>
      </select>
    </div>

    <div class="autofill-toggle">
      <label class="checkbox-label">
        <input type="checkbox" id="autofill" checked />
        <span>Auto-fill answers in Moodle</span>
      </label>
    </div>

    <button id="saveBtn">Save Settings</button>
    <p id="status"></p>

    <script src="popup.js"></script>
  </body>
</html>
